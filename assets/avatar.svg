<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1E1B4B" />
      <stop offset="100%" stop-color="#0F172A" />
    </linearGradient>
    <linearGradient id="glowGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3B82F6" />
      <stop offset="50%" stop-color="#8B5CF6" />
      <stop offset="100%" stop-color="#EC4899" />
    </linearGradient>
    <linearGradient id="circleGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00FF94" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#3B82F6" stop-opacity="0.2" />
    </linearGradient>
    <filter id="neonGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="200" height="200" rx="40" fill="url(#bgGrad)" />
  
  <!-- Outer glowing rings -->
  <circle cx="100" cy="100" r="85" fill="none" stroke="url(#circleGrad)" stroke-width="1.5" stroke-dasharray="8 6" />
  <circle cx="100" cy="100" r="75" fill="none" stroke="#27272A" stroke-width="1" />
  
  <!-- Inner creative geometry representing a multi-media creator -->
  <path d="M100 35 L155 135 H45 Z" fill="none" stroke="url(#glowGrad)" stroke-width="2" filter="url(#neonGlow)" />
  <circle cx="100" cy="100" r="40" fill="none" stroke="#F5F5F7" stroke-width="2" />
  <circle cx="100" cy="100" r="15" fill="url(#glowGrad)" filter="url(#neonGlow)" />
  
  <!-- Tech lines -->
  <line x1="100" y1="15" x2="100" y2="35" stroke="#F5F5F7" stroke-width="1.5" />
  <line x1="100" y1="165" x2="100" y2="185" stroke="#F5F5F7" stroke-width="1.5" />
  <line x1="15" y1="100" x2="35" y2="100" stroke="#F5F5F7" stroke-width="1.5" />
  <line x1="165" y1="100" x2="185" y2="100" stroke="#F5F5F7" stroke-width="1.5" />
</svg>
